# Phase 8D: Feature Complexity Sweep
# Tests how peak computation layer changes with feature count

general:
  random_seed: 42
  device: cpu
  quick_run: false

feature_counts: [2, 4, 8, 16]

data:
  # z = sum(w_i * x_i) + sin(x_0 * x_1)
  # weights w_i ~ Uniform(0.5, 3.0)
  # intermediary = sin(x_0 * x_1)
  feature_range: [0.1, 3.0]
  n_train: 100
  n_test: 50
  n_datasets_full: 10
  n_datasets_quick: 3

causal_tracing:
  noise_scale: 0.5

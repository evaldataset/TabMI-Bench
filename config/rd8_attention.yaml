# config/rd8_attention.yaml
# RD-8: Attention Map Analysis (shared config for all 5 RD-8 experiments)
# Scripts:
#   experiments/rd8_attention_visualization.py
#   experiments/rd8_copy_mechanism_attention.py
#   experiments/rd8_head_specialization.py
#   experiments/rd8_feature_interaction.py
#   experiments/rd8_qk_embedding.py

random_seed: 42
quick_run: true
device: cpu
model_path: tabpfn-v2-regressor.ckpt

# Model architecture
n_layers: 12
n_heads: 6

# Shared data generation: z = a·b + c
n_train: 50
n_test: 10

# Results directories (per-experiment)
results_dirs:
  attention_visualization: results/rd8/attention_heatmaps/
  copy_mechanism_attention: results/rd8/copy_mechanism_attention/
  head_specialization: results/rd8/head_analysis/
  feature_interaction: results/rd8/feature_interaction/
  qk_embedding: results/rd8/qk_embeddings/

# rd8_attention_visualization
visualization:
  quick_layers: [0, 5, 8, 11]  # layers to save heatmaps in quick mode

# rd8_copy_mechanism_attention
copy_mechanism:
  n_datasets: 5          # quick=5, full=20

# rd8_head_specialization
head_specialization:
  target_heatmap_layer: 5
  eps: 1.0e-10            # JSD epsilon

# rd8_feature_interaction
feature_interaction:
  hypothesis_layers: [5, 6, 7, 8]
  heatmap_layers: [0, 5, 8, 11]

# rd8_qk_embedding
qk_embedding:
  layers_to_analyze: [0, 5, 8, 11]
  pca_n_components: 2

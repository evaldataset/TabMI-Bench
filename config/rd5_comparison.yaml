# RD-5: Multi-TFM Comparative Analysis Configuration
# Phase 4 — TabPFN vs TabICL vs iLTM

general:
  random_seed: 42
  device: cpu
  quick_run: true

models:
  tabpfn:
    model_path: tabpfn-v2-regressor.ckpt
    n_layers: 12
    hidden_dim: 192
    core_layer: 6

  tabicl:
    random_state: 42
    n_layers: 12
    hidden_dim: 512
    core_layer: 5

  iltm:
    n_ensemble: 1  # Reduced for CPU speed
    n_layers: 4  # 3 probeable + 1 output
    hidden_dim: 512
    core_layer: 1

data:
  linear:  # z = alpha*x + beta*y
    n_train: 50
    n_test: 10
    alpha_values_quick: [1, 3, 5]
    beta_values_quick: [1, 3, 5]
    alpha_values_full: [1, 2, 3, 4, 5]
    beta_values_full: [1, 2, 3, 4, 5]

  quadratic:  # z = a*b + c
    n_train: 50
    n_test: 10
    n_datasets_quick: 5
    n_datasets_full: 20
    a_range: [0.5, 3.0]
    b_range: [0.5, 3.0]
    c_range: [0.5, 3.0]

experiments:
  coefficient_probing:
    complexities: [0]
    iltm_datasets_quick: 3

  intermediary_probing:
    complexities: [0]
    iltm_datasets_quick: 3

  copy_mechanism:
    probe_targets: [a, b, c, ab]
    complexities: [0]
    iltm_datasets_quick: 3

  cka:
    n_datasets_quick: 5
    n_datasets_full: 15

  patching:
    conditions:
      - name: a-corrupted
        col: 0
        corrupt_val: 4.0
      - name: b-corrupted
        col: 1
        corrupt_val: 5.0
      - name: c-corrupted
        col: 2
        corrupt_val: 4.0

  steering:
    alpha_high: 5.0
    alpha_low: 1.0
    beta_shared: 1.0
    lambdas: [-3, -2, -1, -0.5, 0, 0.5, 1, 2, 3]
    tabicl_layers: [2, 4, 5, 6, 8, 10]

  sae:
    expansion_factor: 4
    n_epochs: 50
    batch_size: 64
    learning_rate: 0.001

hypotheses:
  H1: "TabICL의 Column→Row attention에서도 핵심 계산 구간 존재"
  H2: "TabICL 구간이 TabPFN L5-8보다 이른 레이어에 위치"
  H3: "iLTM의 Tree+Neural 통합 구조에서 계산이 Neural 부분에 집중"
  H4: "TabICL에서도 coefficient steering 가능"
  H5: "모델 크기와 steering 효과 양의 상관관계"
  H6: "TabICL SAE가 TabPFN과 유사한 계수 상관 패턴"
  H7: "큰 모델에서 SAE expansion 시 더 세밀한 분해"
  H8: "SAE cross-model feature universality"
  H9: "합성 데이터 발견이 실세계에서도 유지"
  H10: "분류/회귀 간 SAE 특성 overlap > 50%"
